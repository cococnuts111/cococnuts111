<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Clientes — Josué Enrique</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    :root{
      --bg:#0a0608;
      --bg2:#0f0608;
      --bg3:#0d0508;
      --red:#7a1a00;
      --red2:#bf4a20;
      --red3:#e8c4a0;
      --muted:#c9b8b0;
      --dim:#5a3020;
      --dimmer:#3a1a10;
      --border:#3a1a10;
      --border2:#1a0a08;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      color:var(--muted);
      font-family:'Share Tech Mono', monospace;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:40px 15px;
    }

    .wrap{
      width:100%;
      max-width:700px;
    }

    .form-box{
      border:1px solid var(--border);
      background:var(--bg);
    }

    .fhead{
      background:var(--bg2);
      border-bottom:2px solid var(--red);
      padding:30px;
      text-align:center;
    }

    .fhead-omega{
      font-size:40px;
      color:var(--red);
    }

    .fhead-title{
      font-family:'Cinzel', serif;
      font-size:20px;
      letter-spacing:5px;
      color:var(--red3);
      margin-top:10px;
    }

    .fhead-sub{
      font-size:11px;
      color:var(--dim);
      margin-top:5px;
      letter-spacing:2px;
    }

    .fbody{
      padding:25px;
    }

    .divider{
      margin:25px 0 15px;
      border-top:1px solid var(--border);
      position:relative;
    }

    .divider span{
      position:absolute;
      top:-8px;
      left:50%;
      transform:translateX(-50%);
      background:var(--bg);
      padding:0 10px;
      font-size:10px;
      color:var(--dimmer);
      letter-spacing:2px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      margin-bottom:15px;
    }

    .row.full{
      grid-template-columns:1fr;
    }

    .row.three{
      grid-template-columns:1fr 1fr 1fr;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .label{
      font-size:10px;
      color:var(--red);
      letter-spacing:2px;
      text-transform:uppercase;
      display:flex;
      align-items:center;
      gap:5px;
    }

    .inp,
    .sel,
    .txa{
      background:var(--bg3);
      border:1px solid var(--border);
      color:var(--muted);
      padding:11px;
      font-family:'Share Tech Mono', monospace;
      outline:none;
      width:100%;
    }

    .inp:focus,
    .sel:focus,
    .txa:focus{
      border-color:var(--red2);
    }

    .txa{
      resize:vertical;
      min-height:90px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:1px solid var(--red);
      background:transparent;
      color:var(--red2);
      font-family:'Cinzel', serif;
      letter-spacing:4px;
      cursor:pointer;
      margin-top:10px;
      transition:0.2s;
    }

    .btn:hover{
      background:var(--border2);
      color:var(--red3);
    }

    .toast{
      margin-top:15px;
      padding:12px;
      text-align:center;
      display:none;
      border:1px solid #1a6020;
      color:#40c060;
    }

    @media(max-width:600px){
      .row,
      .row.three{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<div class="wrap">

  <div class="form-box">

    <div class="fhead">
      <div class="fhead-omega">Ω</div>
      <div class="fhead-title">Registro de Clientes</div>
      <div class="fhead-sub">Josué Enrique · El Salvador 🇸🇻</div>
    </div>

    <div class="fbody">

      <form action="https://formspree.io/f/mpqnwjvb" method="POST" id="mi-formulario">

        <div class="divider">
          <span>DATOS PERSONALES</span>
        </div>

        <div class="row">

          <div class="field">
            <label class="label">
              <i class="ti ti-user"></i>
              Nombre completo *
            </label>

            <input
              class="inp"
              type="text"
              id="f-nombre"
              name="nombre"
              required
              placeholder="Ej: María López">
          </div>

          <div class="field">
            <label class="label">
              <i class="ti ti-id-badge"></i>
              DUI *
            </label>

            <input
              class="inp"
              type="text"
              id="f-dui"
              name="dui"
              maxlength="10"
              required
              placeholder="00000000-0">
          </div>

        </div>

        <div class="row">

          <div class="field">
            <label class="label">
              <i class="ti ti-phone"></i>
              Teléfono *
            </label>

            <input
              class="inp"
              type="tel"
              id="f-tel"
              name="telefono"
              required
              placeholder="7000-0000">
          </div>

          <div class="field">
            <label class="label">
              <i class="ti ti-mail"></i>
              Correo
            </label>

            <input
              class="inp"
              type="email"
              id="f-email"
              name="correo"
              placeholder="cliente@gmail.com">
          </div>

        </div>

        <div class="row full">

          <div class="field">
            <label class="label">
              <i class="ti ti-map-pin"></i>
              Dirección
            </label>

            <input
              class="inp"
              type="text"
              id="f-dir"
              name="direccion"
              placeholder="Colonia, municipio, departamento">
          </div>

        </div>

        <div class="divider">
          <span>DATOS DEL PEDIDO</span>
        </div>

        <div class="row">

          <div class="field">
            <label class="label">
              <i class="ti ti-calendar"></i>
              Fecha
            </label>

            <input
              class="inp"
              type="date"
              id="f-fecha"
              name="fecha">
          </div>

          <div class="field">
            <label class="label">
              <i class="ti ti-adjustments"></i>
              Estado *
            </label>

            <select
              class="sel"
              id="f-estado"
              name="estado"
              required>

              <option value="">Seleccionar...</option>
              <option>Pendiente</option>
              <option>En proceso</option>
              <option>Entregado</option>
              <option>Cancelado</option>

            </select>
          </div>

        </div>

        <div class="row full">

          <div class="field">
            <label class="label">
              <i class="ti ti-package"></i>
              Pedido *
            </label>

            <textarea
              class="txa"
              id="f-pedido"
              name="pedido"
              required
              placeholder="Describe el producto o servicio..."></textarea>
          </div>

        </div>

        <div class="row three">

          <div class="field">
            <label class="label">
              <i class="ti ti-stack"></i>
              Cantidad
            </label>

            <input
              class="inp"
              type="number"
              id="f-cant"
              name="cantidad"
              min="1"
              placeholder="1">
          </div>

          <div class="field">
            <label class="label">
              <i class="ti ti-currency-dollar"></i>
              Total
            </label>

            <input
              class="inp"
              type="number"
              id="f-total"
              name="total"
              step="0.01"
              placeholder="0.00">
          </div>

          <div class="field">
            <label class="label">
              <i class="ti ti-notes"></i>
              Observaciones
            </label>

            <input
              class="inp"
              type="text"
              id="f-obs"
              name="observaciones"
              placeholder="Notas extras">
          </div>

        </div>

        <button type="submit" class="btn">
          Registrar pedido — Ω
        </button>

        <div class="toast" id="toast">
          ✓ Pedido enviado correctamente
        </div>

      </form>

    </div>

  </div>

</div>

<script>

  document.getElementById('f-fecha').value =
    new Date().toISOString().split('T')[0];

  document.getElementById('f-dui').addEventListener('input', function(){

    let v = this.value.replace(/[^0-9]/g,'');

    if(v.length > 8){
      v = v.slice(0,8) + '-' + v.slice(8,9);
    }

    this.value = v;

  });

  const form = document.getElementById('mi-formulario');

  form.addEventListener('submit', async function(e){

    e.preventDefault();

    const data = new FormData(form);

    const res = await fetch(form.action,{
      method:'POST',
      body:data,
      headers:{
        'Accept':'application/json'
      }
    });

    const toast = document.getElementById('toast');

    if(res.ok){

      toast.style.display = 'block';

      form.reset();

      document.getElementById('f-fecha').value =
        new Date().toISOString().split('T')[0];

      setTimeout(()=>{
        toast.style.display = 'none';
      },4000);

    } else {

      alert('Error al enviar formulario');

    }

  });

</script>

</body>
</html>
